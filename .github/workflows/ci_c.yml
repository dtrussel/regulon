name: CI — C11 Library

# RON-TP-001 §2.6 | RON-TC-QUAL-008
# Triggers on every push/PR to any branch. Must pass before merging to main.

on:
  push:
    branches: ["**"]
    paths:
      - "regulon-c/**"
      - ".clang-format"
      - ".github/workflows/ci_c.yml"
  pull_request:
    branches: [main]
    paths:
      - "regulon-c/**"
      - ".clang-format"
      - ".github/workflows/ci_c.yml"

env:
  BUILD_DIR: regulon-c/build_host
  BUILD_DIR_COV: regulon-c/build_cov
  SRC_DIR: regulon-c

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + Unit Tests with AddressSanitizer / UBSan
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (GCC + ASan/UBSan)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake gcc clang clang-format cppcheck \
               lcov gcovr python3

      - name: Configure (GCC, tests enabled, sanitisers)
        run: |
          cmake -B ${{ env.BUILD_DIR }} -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Run tests (ctest with JUnit XML)
        run: |
          cd ${{ env.BUILD_DIR }}
          ctest --output-on-failure --output-junit test_results_c.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-c
          path: ${{ env.BUILD_DIR }}/test_results_c.xml

  # ---------------------------------------------------------------------------
  # Job 2: Clang build (second toolchain — RON-QR-004)
  # ---------------------------------------------------------------------------
  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang

      - name: Configure (Clang, tests disabled)
        run: |
          cmake -B regulon-c/build_clang -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=OFF \
                -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build regulon-c/build_clang --parallel

  # ---------------------------------------------------------------------------
  # Job 3: Code formatting check (clang-format)
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format Check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update -q && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find regulon-c/src regulon-c/include/ron \
               -name "*.c" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Job 4: Static analysis — cppcheck (MISRA subset)
  # ---------------------------------------------------------------------------
  static-analysis:
    name: cppcheck Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck (MISRA addon)
        run: |
          cppcheck --enable=all --error-exitcode=1 \
                   --suppress=missingIncludeSystem \
                   -I regulon-c/include \
                   regulon-c/src/ 2>&1 | tee cppcheck_results.txt

      - name: Upload cppcheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-results
          path: cppcheck_results.txt

  # ---------------------------------------------------------------------------
  # Job 5: Code coverage (must reach 100% statement + branch — RON-QR-022)
  # ---------------------------------------------------------------------------
  coverage:
    name: Code Coverage (lcov)
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake gcc lcov

      - name: Configure with coverage instrumentation
        run: |
          cmake -B ${{ env.BUILD_DIR_COV }} -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_C_FLAGS="--coverage -O0"

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR_COV }} --parallel

      - name: Run tests
        run: |
          cd ${{ env.BUILD_DIR_COV }}
          ctest --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture \
               --directory ${{ env.BUILD_DIR_COV }} \
               --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/test/*' '*/unity/*' \
               --output-file coverage_filtered.info
          genhtml coverage_filtered.info \
               --output-directory coverage_html \
               --branch-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/

  # ---------------------------------------------------------------------------
  # Job 6: CBMC Formal Verification (when harnesses exist — RON-TP-001 §2.2)
  # ---------------------------------------------------------------------------
  formal-verification:
    name: CBMC Formal Proofs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CBMC
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cbmc

      - name: Run CBMC proofs (if any harnesses exist)
        run: |
          PROOFS=$(find regulon-c/test/formal -name "*_proof.c" 2>/dev/null || true)
          if [ -z "$PROOFS" ]; then
            echo "No CBMC harnesses yet — skipping formal verification."
            exit 0
          fi
          for harness in $PROOFS; do
            echo "=== CBMC: $harness ==="
            cbmc --unwind 32 --bounds-check --pointer-check \
                 "$harness" regulon-c/src/*.c \
                 -I regulon-c/include
          done
