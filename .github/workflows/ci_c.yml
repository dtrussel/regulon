name: CI - C11 Library

# RON-TP-001 §2.6 | RON-TC-QUAL-008
# Triggers on every push/PR to any branch. Must pass before merging to main.

on:
  push:
    branches: ["**"]
    paths:
      - "regulon-c/**"
      - "docs/specs/**"
      - "docs/plans/c/**"
      - "CHANGELOG.rst"
      - ".clang-format"
      - ".github/workflows/ci_c.yml"
  pull_request:
    branches: [main]
    paths:
      - "regulon-c/**"
      - "docs/specs/**"
      - "docs/plans/c/**"
      - "CHANGELOG.rst"
      - ".clang-format"
      - ".github/workflows/ci_c.yml"

env:
  BUILD_DIR: regulon-c/build_host
  BUILD_DIR_COV: regulon-c/build_cov
  SRC_DIR: regulon-c

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build + Unit Tests with AddressSanitizer / UBSan
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (GCC + ASan/UBSan)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake gcc clang clang-format cppcheck \
               python3 python3-pip

      - name: Configure (GCC, tests enabled, sanitisers)
        run: |
          cmake -B ${{ env.BUILD_DIR }} -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --parallel

      - name: Run tests (ctest with JUnit XML)
        run: |
          cd ${{ env.BUILD_DIR }}
          ctest --output-on-failure --output-junit test_results_c.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-c
          path: ${{ env.BUILD_DIR }}/test_results_c.xml

  # ---------------------------------------------------------------------------
  # Job 2: Double-precision host regression
  # ---------------------------------------------------------------------------
  build-double:
    name: Build & Test (GCC Double)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y cmake gcc

      - name: Configure (GCC, double precision)
        run: |
          cmake -B regulon-c/build_double -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DRON_USE_DOUBLE=ON \
                -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build regulon-c/build_double --parallel

      - name: Run tests
        run: |
          cd regulon-c/build_double
          ctest --output-on-failure --output-junit test_results_c_double.xml

  # ---------------------------------------------------------------------------
  # Job 3: Clang build + tests (secondary host toolchain)
  # ---------------------------------------------------------------------------
  build-clang:
    name: Build & Test (Clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang

      - name: Configure (Clang, tests enabled)
        run: |
          cmake -B regulon-c/build_clang -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build regulon-c/build_clang --parallel

      - name: Run tests
        run: |
          cd regulon-c/build_clang
          ctest --output-on-failure --output-junit test_results_c_clang.xml

  # ---------------------------------------------------------------------------
  # Job 4: Code formatting check (clang-format)
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format Check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update -q && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --dry-run --Werror \
            regulon-c/src/ron_feedforward.c \
            regulon-c/src/ron_filter.c \
            regulon-c/src/ron_pid_api.c \
            regulon-c/src/ron_pid_config.c \
            regulon-c/src/ron_pid_core.c \
            regulon-c/src/ron_pid_fault.c \
            regulon-c/src/ron_pid_internal.h \
            regulon-c/include/ron/ron_feedforward.h \
            regulon-c/include/ron/ron_filter.h \
            regulon-c/include/ron/ron_platform.h \
            regulon-c/include/ron/ron_pid_types.h \
            regulon-c/include/ron/ron_pid.h

  # ---------------------------------------------------------------------------
  # Job 5: Static analysis - cppcheck (MISRA subset) + complexity
  # ---------------------------------------------------------------------------
  static-analysis:
    name: cppcheck Static Analysis
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cppcheck python3 python3-pip
          python3 -m pip install --user lizard

      - name: Run cppcheck (MISRA addon)
        run: |
          cppcheck --addon=misra.py --check-level=exhaustive \
                   --enable=style --error-exitcode=1 \
                   --suppress=missingIncludeSystem \
                   --suppress=misra-c2012-2.5 \
                   --suppress=misra-c2012-8.7 \
                   --suppress=misra-c2012-15.5 \
                   --suppress=misra-c2012-15.7 \
                   --suppress=misra-c2012-20.10 \
                   -I regulon-c/include \
                   regulon-c/src/ron_feedforward.c \
                   regulon-c/src/ron_filter.c \
                   regulon-c/src/ron_pid_api.c \
                   regulon-c/src/ron_pid_config.c \
                   regulon-c/src/ron_pid_core.c \
                   regulon-c/src/ron_pid_fault.c \
                   2>&1 | tee cppcheck_results.txt

      - name: Run complexity check
        run: |
          python3 -m lizard -C 10 \
            regulon-c/src/ron_feedforward.c \
            regulon-c/src/ron_filter.c \
            regulon-c/src/ron_pid_api.c \
            regulon-c/src/ron_pid_config.c \
            regulon-c/src/ron_pid_core.c \
            regulon-c/src/ron_pid_fault.c

      - name: Upload cppcheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-results
          path: cppcheck_results.txt

  # ---------------------------------------------------------------------------
  # Job 6: Code coverage (must reach 100% statement + branch - RON-QR-022)
  # ---------------------------------------------------------------------------
  coverage:
    name: Code Coverage (LLVM)
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang llvm ninja-build python3

      - name: Configure with LLVM coverage instrumentation
        run: |
          cmake -G Ninja -B ${{ env.BUILD_DIR_COV }} -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=ON \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_C_FLAGS="-O0 -g -fprofile-instr-generate -fcoverage-mapping"

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR_COV }} --parallel

      - name: Run tests
        run: |
          mkdir -p ${{ env.BUILD_DIR_COV }}/profiles
          export LLVM_PROFILE_FILE="${{ github.workspace }}/${{ env.BUILD_DIR_COV }}/profiles/%p.profraw"
          ctest --test-dir ${{ env.BUILD_DIR_COV }} --output-on-failure

      - name: Collect coverage
        run: |
          llvm-profdata merge -sparse \
            ${{ env.BUILD_DIR_COV }}/profiles/*.profraw \
            -o ${{ env.BUILD_DIR_COV }}/coverage.profdata

          mapfile -t test_bins < <(find ${{ env.BUILD_DIR_COV }} -type f -executable -name 'test_ron_*' | sort)
          if [ "${#test_bins[@]}" -eq 0 ]; then
            echo "No Regulon test executables found"
            exit 1
          fi

          object_args=("${test_bins[0]}")
          for bin in "${test_bins[@]:1}"; do
            object_args+=("-object" "$bin")
          done

          source_args=(
            -sources regulon-c/src/ron_feedforward.c
            -sources regulon-c/src/ron_filter.c
            -sources regulon-c/src/ron_pid_api.c
            -sources regulon-c/src/ron_pid_config.c
            -sources regulon-c/src/ron_pid_core.c
            -sources regulon-c/src/ron_pid_fault.c
          )

          llvm-cov export "${object_args[@]}" \
            -instr-profile ${{ env.BUILD_DIR_COV }}/coverage.profdata \
            -format=text -summary-only -show-branch-summary \
            "${source_args[@]}" > coverage.json

          llvm-cov show "${object_args[@]}" \
            -instr-profile ${{ env.BUILD_DIR_COV }}/coverage.profdata \
            -format=html -output-dir coverage_html -show-branch-summary \
            "${source_args[@]}"

          python3 - <<'PY'
          import json
          with open("coverage.json", encoding="utf-8") as f:
              totals = json.load(f)["data"][0]["totals"]
          line_pct = totals["lines"]["percent"]
          branch_pct = totals["branches"]["percent"]
          print(f"LLVM coverage: lines={line_pct:.1f}%; branches={branch_pct:.1f}%")
          if line_pct != 100.0 or branch_pct != 100.0:
              raise SystemExit(1)
          PY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage_html/
            coverage.json
            ${{ env.BUILD_DIR_COV }}/coverage.profdata

  # ---------------------------------------------------------------------------
  # Job 7: ARM cross-compile smoke build (RON-TC-QUAL-022)
  # ---------------------------------------------------------------------------
  cross-arm:
    name: Cross Compile (ARM Cortex-M)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc-arm-none-eabi

      - name: Configure ARM PID build
        run: |
          cmake -G Ninja -B regulon-c/build_arm -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=OFF \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/regulon-c/cmake/toolchains/arm-none-eabi.cmake \
                -DCMAKE_C_FLAGS="-mcpu=cortex-m4 -mfpu=fpv4-sp-d16 -mfloat-abi=hard -mthumb"

      - name: Build ARM PID library
        run: cmake --build regulon-c/build_arm --parallel

  # ---------------------------------------------------------------------------
  # Job 8: ARMv7 Clang bare-metal cross-compile smoke build (RON-TC-QUAL-022)
  # ---------------------------------------------------------------------------
  cross-arm-clang:
    name: Cross Compile (ARMv7 Clang)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang llvm libnewlib-arm-none-eabi

      - name: Configure ARMv7 Clang PID build
        run: |
          cmake -G Ninja -B regulon-c/build_armv7_clang -S ${{ env.SRC_DIR }} \
                -DRON_BUILD_TESTS=OFF \
                -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/regulon-c/cmake/toolchains/armv7-none-eabi-clang.cmake \
                -DRON_ARM_CLANG_NEWLIB_INCLUDE=/usr/include/newlib \
                -DRON_ARM_CLANG_ALLOW_HEADER_SHIM=OFF

      - name: Build ARMv7 Clang PID library
        run: cmake --build regulon-c/build_armv7_clang --parallel

  # ---------------------------------------------------------------------------
  # Job 9: CBMC Formal Verification (RON-TP-001)
  # ---------------------------------------------------------------------------
  formal-verification:
    name: CBMC Formal Proofs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CBMC
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cbmc

      - name: Run CBMC proofs (if any harnesses exist)
        run: |
          set -o pipefail
          mkdir -p cbmc-results
          PROOFS=$(find regulon-c/test/formal -name "*_proof.c" 2>/dev/null || true)
          if [ -z "$PROOFS" ]; then
            echo "No CBMC harnesses yet - skipping formal verification."
            exit 0
          fi
          for harness in $PROOFS; do
            entry=$(basename "$harness" .c)
            echo "=== CBMC: $harness ==="
            cbmc --function "$entry" \
                 --unwind 32 --unwinding-assertions \
                 --bounds-check --pointer-check \
                 "$harness" \
                 regulon-c/src/ron_feedforward.c \
                 regulon-c/src/ron_filter.c \
                 regulon-c/src/ron_pid_api.c \
                 regulon-c/src/ron_pid_config.c \
                 regulon-c/src/ron_pid_core.c \
                 regulon-c/src/ron_pid_fault.c \
                 -I regulon-c/include \
                 -I regulon-c/test/formal \
                 2>&1 | tee "cbmc-results/${entry}.txt"
          done

      - name: Upload CBMC results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cbmc-results
          path: cbmc-results/
